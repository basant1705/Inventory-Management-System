<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Inventory — Reports</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .glass {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .sidebar-link {
      display: block;
      padding: 12px 16px;
      border-radius: 10px;
      transition: 0.2s;
    }

    .sidebar-link:hover {
      background: rgba(255,255,255,0.25);
    }

    .active-page {
      background: rgba(255,255,255,0.35);
      font-weight: 600;
      border-left: 4px solid #fff;
    }
  </style>
</head>

<body class="bg-[linear-gradient(135deg,#6a11cb,#2575fc)] min-h-screen font-sans text-white">

<div class="flex">  

  <!-- ⭐ MAIN CONTENT -->
  <div class="flex-1 p-6">

    <div class="max-w-6xl mx-auto mb-6">
      <h1 class="text-3xl font-bold">Reports Dashboard</h1>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Sales Chart -->
      <div class="glass p-6">
        <h2 class="text-xl font-semibold mb-4">Sales (Last 30 Days)</h2>
        <canvas id="salesChart" height="200"></canvas>
      </div>

      <!-- Stock Chart -->
      <div class="glass p-6">
        <h2 class="text-xl font-semibold mb-4">Stock Value Distribution</h2>
        <canvas id="stockChart" height="200"></canvas>
      </div>

      <!-- Low Stock Table -->
      <div class="glass p-6 lg:col-span-2">
        <h2 class="text-xl font-semibold mb-4">Low Stock Alerts</h2>

        <table class="min-w-full text-sm bg-white/10 rounded">
          <thead class="bg-white/30 text-black uppercase text-xs">
            <tr>
              <th class="p-3 text-left">Product</th>
              <th class="p-3 text-left">Category</th>
              <th class="p-3 text-left">Stock</th>
              <th class="p-3 text-left">Reorder Level</th>
            </tr>
          </thead>
          <tbody id="lowStockTable" class="divide-y divide-white/20"></tbody>
        </table>
      </div>

    </div>

    <!-- ⭐ DOWNLOAD BUTTON -->
    <div class="text-center mt-6">
      <button onclick="downloadReport()" 
        class="px-6 py-3 bg-blue-400/40 text-white font-bold rounded-xl shadow-lg 
               backdrop-blur-md hover:bg-blue-400/60 transition">
        ⬇ Download Report
      </button>
    </div>

  </div>
</div>

<!-- ⭐ JavaScript -->
<script>
  const salesData = Array.from({length: 30}, () => Math.floor(Math.random()*100)+20);
  const stockData = [120, 90, 60, 45, 30];
  const stockLabels = ['Electronics','Grocery','Clothing','Stationery','Others'];

  // Sales Chart
  new Chart(document.getElementById('salesChart'), {
    type: 'line',
    data: {
      labels: Array.from({length:30}, (_,i)=>`Day ${i+1}`),
      datasets: [{
        label: 'Sales',
        data: salesData,
        borderColor: 'white',
        backgroundColor: 'rgba(255,255,255,0.25)',
        fill: true,
        tension: 0.3
      }]
    },
    options: { responsive:true }
  });

  // Stock Pie Chart
  new Chart(document.getElementById('stockChart'), {
    type: 'doughnut',
    data: {
      labels: stockLabels,
      datasets: [{
        data: stockData,
        backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6']
      }]
    },
    options: { responsive:true, plugins:{ legend:{ position:'bottom' } } }
  });

  // Low Stock Table
  const lowStock = [
    {name:'AA Batteries', category:'Electronics', stock:5, reorder:20},
    {name:'Milk Powder 500g', category:'Grocery', stock:8, reorder:10},
    {name:'Notebook', category:'Stationery', stock:3, reorder:15}
  ];

  document.getElementById('lowStockTable').innerHTML = lowStock.map(p => `
    <tr class="hover:bg-white/20">
      <td class="p-3">${p.name}</td>
      <td class="p-3">${p.category}</td>
      <td class="p-3 text-red-300 font-bold">${p.stock}</td>
      <td class="p-3">${p.reorder}</td>
    </tr>
  `).join('');

  // ⭐ DOWNLOAD REPORT PDF
  function downloadReport() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.text("Smart Inventory — Reports Summary", 10, 15);

    doc.setFontSize(12);
    doc.setFont("helvetica", "normal");

    doc.text("📊 Sales Summary (Last 30 Days)", 10, 30);
    const totalSales = salesData.reduce((a, b) => a + b, 0);
    doc.text("Total Sales Amount: " + totalSales, 10, 38);

    doc.text("📦 Stock Distribution", 10, 58);
    stockLabels.forEach((label, i) => {
      doc.text(`- ${label}: ${stockData[i]} units`, 10, 67 + i * 8);
    });

    doc.text("⚠ Low Stock Alerts", 10, 110);
    lowStock.forEach((item, i) => {
      doc.text(
        `${i + 1}. ${item.name} — Stock: ${item.stock} (Reorder: ${item.reorder})`,
        10,
        120 + i * 10
      );
    });

    doc.save("Inventory_Report.pdf");
  }
</script>

</body>
</html>
