<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Inventory Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-800 font-sans min-h-screen">

<!-- Top Navigation -->
<header class="bg-white border-b p-4 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><rect width='100%' height='100%' fill='%23007bff' rx='8'/><text x='50%' y='55%' fill='white' font-size='18' font-family='Arial' text-anchor='middle'>SI</text></svg>" alt="logo" class="h-9 w-9">
    <div>
      <div class="font-semibold">Smart Inventory</div>
      <div class="text-xs text-slate-500">Dashboard</div>
    </div>
  </div>
  <button id="logoutBtn" class="px-3 py-2 bg-red-600 text-white rounded-lg text-sm">Logout</button>
</header>

<!-- Main Content -->
<main class="p-6">
  <h1 class="text-2xl font-bold mb-4">Welcome to Smart Inventory Dashboard</h1>
  <p class="text-slate-600">You are currently logged in. Click Logout to return to the login page.</p>
</main>

<script>
  // Logout button functionality
  document.getElementById('logoutBtn').addEventListener('click', () => {
    // Optionally clear session data here (frontend simulation)
    alert('You have been logged out!');
    // Redirect to login page
    window.location.href = "login.html";
  });
</script>
</body>
</html>
