<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Inventory – Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Fade + Slide Animation */
    @keyframes slideFade {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Floating Circle Animation */
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }

    /* Particle animations */
    @keyframes particle {
      0% { transform: translateY(0) translateX(0); opacity: 0.4; }
      100% { transform: translateY(-200px) translateX(50px); opacity: 0; }
    }

    /* Neon Glow Animation */
    @keyframes neon {
      0%, 100% { box-shadow: 0 0 8px #00eaff, 0 0 16px #00eaff; }
      50% { box-shadow: 0 0 16px #00f7ff, 0 0 32px #00f7ff; }
    }

    /* Magnetic button hover */
    .magnetic:hover {
      transform: scale(1.08);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center overflow-hidden bg-gradient-to-br from-indigo-700 via-blue-700 to-cyan-600 relative">

  <!-- Animated Floating Particles -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <span class="absolute w-3 h-3 bg-white/30 rounded-full animate-[particle_6s_linear_infinite] left-10 bottom-10"></span>
    <span class="absolute w-2 h-2 bg-white/20 rounded-full animate-[particle_8s_linear_infinite] left-1/4 bottom-5"></span>
    <span class="absolute w-4 h-4 bg-white/25 rounded-full animate-[particle_10s_linear_infinite] right-10 bottom-20"></span>
    <span class="absolute w-3 h-3 bg-white/30 rounded-full animate-[particle_7s_linear_infinite] right-1/3 bottom-8"></span>
  </div>

  <!-- Floating glow circles -->
  <div class="absolute top-20 left-10 w-40 h-40 bg-cyan-400/20 blur-3xl rounded-full animate-[float_5s_ease_infinite]"></div>
  <div class="absolute bottom-20 right-10 w-52 h-52 bg-blue-400/20 blur-3xl rounded-full animate-[float_6s_ease_infinite]"></div>

  <!-- Login Card -->
  <div class="relative backdrop-blur-xl bg-white/20 border border-white/30 rounded-2xl p-10 w-full max-w-md shadow-2xl animate-[slideFade_0.8s_ease-out]">

    <h2 class="text-4xl font-extrabold text-white text-center mb-10 drop-shadow-2xl">
      Smart Inventory Login
    </h2>

    <!-- Username -->
    <div class="mb-6">
      <label class="text-white/80 font-medium">Username</label>
      <input id="username"
        class="w-full mt-2 px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white 
        focus:ring-2 focus:ring-cyan-300 focus:border-cyan-400 transition-all duration-300"
        type="text" placeholder="Enter your username" />
    </div>

    <!-- Password -->
    <div class="mb-8">
      <label class="text-white/80 font-medium">Password</label>
      <input id="password"
        class="w-full mt-2 px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white 
        focus:ring-2 focus:ring-cyan-300 focus:border-cyan-400 transition-all duration-300"
        type="password" placeholder="Enter your password" />
    </div>

    <!-- Login Button -->
    <button id="loginBtn"
      class="w-full py-3 bg-cyan-400 text-black font-bold text-lg rounded-lg 
      shadow-lg hover:bg-cyan-300 active:scale-95 transition-all duration-300 magnetic 
      animate-[neon_2s_infinite]">
      Login
    </button>
  </div>

  <script>
    document.getElementById("loginBtn").addEventListener("click", () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Please fill all fields!");
        return;
      }

      alert(`Welcome, ${username}!`);
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
